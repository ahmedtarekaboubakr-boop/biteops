services:
  - type: web
    name: biteops
    runtime: node
    plan: free
    buildCommand: npm install && cd server && npm install && cd .. && cd client && npm install && npm run build && cd ..
    startCommand: cd server && npm start
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: BUILD_TARGET
        value: render
