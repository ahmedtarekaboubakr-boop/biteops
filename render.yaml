services:
  - type: web
    name: biteops
    runtime: node
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: cd server && npm start
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
